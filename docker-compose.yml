version: '3'
services:

  postgres:
    image: postgres:14
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  nakama:
    image: heroiclabs/nakama:3.21.1
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up
        --database.address postgres:localdb@postgres:5432/nakama &&
        exec /nakama/nakama
        --name nakama1
        --database.address postgres:localdb@postgres:5432/nakama
        --socket.server_key "defaultkey"
        --runtime.path /backend
        --session.token_expiry_sec 7200
    volumes:
      - ./backend/build:/backend
    ports:
      - "7349:7349"
      - "7350:7350"
      - "7351:7351"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pgdata: